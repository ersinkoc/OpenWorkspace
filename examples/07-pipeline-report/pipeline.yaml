name: weekly-report
description: Generate a weekly summary report from Calendar events and Gmail activity.

steps:
  - id: get_week_events
    action: calendar.listEvents
    params:
      calendarId: primary
      timeMin: "{{ now | startOfWeek | isoDate }}"
      timeMax: "{{ now | endOfWeek | isoDate }}"
      singleEvents: true
      orderBy: startTime

  - id: get_week_emails
    action: gmail.searchMessages
    params:
      q: "newer_than:7d"
      maxResults: 100

  - id: count_by_label
    action: gmail.countByLabel
    params:
      messageIds: "{{ steps.get_week_emails.result.messages | pluck('id') }}"

  - id: create_report_sheet
    action: sheets.createSpreadsheet
    params:
      title: "Weekly Report - {{ now | date('YYYY-MM-DD') }}"

  - id: write_events_summary
    action: sheets.updateValues
    params:
      spreadsheetId: "{{ steps.create_report_sheet.result.spreadsheetId }}"
      range: "Sheet1!A1:D1"
      values:
        - ["Date", "Time", "Event", "Duration"]

  - id: write_events_data
    action: sheets.appendValues
    params:
      spreadsheetId: "{{ steps.create_report_sheet.result.spreadsheetId }}"
      range: "Sheet1!A:D"
      values: "{{ steps.get_week_events.result.items | eventRows }}"

  - id: write_email_summary
    action: sheets.updateValues
    params:
      spreadsheetId: "{{ steps.create_report_sheet.result.spreadsheetId }}"
      range: "Sheet1!F1:G1"
      values:
        - ["Label", "Count"]

  - id: write_email_data
    action: sheets.appendValues
    params:
      spreadsheetId: "{{ steps.create_report_sheet.result.spreadsheetId }}"
      range: "Sheet1!F:G"
      values: "{{ steps.count_by_label.result | labelRows }}"

  - id: send_report_email
    action: gmail.sendMessage
    params:
      to: "team@example.com"
      subject: "Weekly Report - {{ now | date('YYYY-MM-DD') }}"
      body: "Weekly report is ready: {{ steps.create_report_sheet.result.spreadsheetUrl }}"
